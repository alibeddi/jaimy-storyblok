name: Performance Checks

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Build application
        run: pnpm build
        env:
          NEXT_PUBLIC_STORYBLOK_API_TOKEN: ${{ secrets.STORYBLOK_API_TOKEN }}

      - name: Run Lighthouse CI
        run: |
          pnpm lighthouse
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  bundle-size:
    name: Bundle Size Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Build with bundle analysis
        run: pnpm build:analyze
        env:
          NEXT_PUBLIC_STORYBLOK_API_TOKEN: ${{ secrets.STORYBLOK_API_TOKEN }}
          ANALYZE: 'true'

      - name: Check bundle sizes
        run: |
          echo "Checking bundle sizes against budgets..."
          node scripts/check-bundle-size.js

      - name: Upload bundle analysis
        uses: actions/upload-artifact@v4
        with:
          name: bundle-analysis
          path: .next/analyze/

  performance-budget:
    name: Performance Budget Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Build application
        run: pnpm build
        env:
          NEXT_PUBLIC_STORYBLOK_API_TOKEN: ${{ secrets.STORYBLOK_API_TOKEN }}

      - name: Check performance budgets
        run: node scripts/check-performance-budget.js

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('.performance-results.json', 'utf8'));
            
            const comment = `## Performance Check Results
            
            ### Bundle Sizes
            - JavaScript: ${results.bundleSize.js}
            - CSS: ${results.bundleSize.css}
            - Total: ${results.bundleSize.total}
            
            ### Status
            ${results.passed ? '✅ All checks passed!' : '❌ Some checks failed'}
            
            ${results.warnings.length > 0 ? `### Warnings\n${results.warnings.join('\n')}` : ''}
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
