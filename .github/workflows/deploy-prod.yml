name: Deploy to prod

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
  
permissions:
  id-token: write
  contents: read

jobs:
  update-prod:
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
    with:
      env: prod
      env_type: prod
      tenant: jaimy
